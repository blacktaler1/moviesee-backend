version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: moviesee
      POSTGRES_PASSWORD: moviesee123
      POSTGRES_DB: moviesee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://moviesee:moviesee123@db:5432/moviesee
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-in-prod
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
