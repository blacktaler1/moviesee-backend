# Render.com deploy konfiguratsiyasi
# render.com → "New +" → "Blueprint" → GitHub repo ulang

services:

  # ─── FastAPI Backend ───────────────────────────────────────
  - type: web
    name: moviesee-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moviesee-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      # Firebase uchun Render dashboard → Environment → qo'shing:
      # FIREBASE_CREDENTIALS_JSON = firebase-adminsdk JSON faylining to'liq mazmuni

# ─── PostgreSQL ────────────────────────────────────────────
databases:
  - name: moviesee-db
    databaseName: moviesee
    user: moviesee
    plan: free
    region: frankfurt
