# Render.com deploy konfiguratsiyasi
# render.com saytiga kiring → "New +" → "Blueprint" → bu faylni ulang

services:

  # ─── FastAPI Backend ───────────────────────────────────────
  - type: web
    name: moviesee-backend
    runtime: python
    region: frankfurt          # Yevropaga yaqin = past latency
    plan: free                 # Tekin tarif
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moviesee-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moviesee-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true    # Render avtomatik yaratadi
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        value: "*"             # Productda o'z domeningizni qo'ying

  # ─── PostgreSQL (tekin 1GB) ────────────────────────────────
  - type: pserv
    name: moviesee-db
    plan: free
    region: frankfurt
    databaseName: moviesee
    databaseUser: moviesee

  # ─── Redis (tekin 25MB) ───────────────────────────────────
  - type: redis
    name: moviesee-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
